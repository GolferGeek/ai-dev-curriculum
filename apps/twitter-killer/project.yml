name: twitter-killer
options:
  bundleIdPrefix: com.golfergeek
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.3"
settings:
  SWIFT_VERSION: "6.0"
  SWIFT_STRICT_CONCURRENCY: minimal
targets:
  twitter-killer:
    type: application
    platform: iOS
    sources:
      - twitter-killer
    settings:
      INFOPLIST_GENERATION: true
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: 1
      GENERATE_INFOPLIST_FILE: true
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
    scheme:
      testTargets:
        - twitter-killerTests
        - twitter-killerUITests

  twitter-killerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - twitter-killerTests
    dependencies:
      - target: twitter-killer
    settings:
      INFOPLIST_GENERATION: true
      GENERATE_INFOPLIST_FILE: true
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/twitter-killer.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/twitter-killer"
      BUNDLE_LOADER: "$(TEST_HOST)"

  twitter-killerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - twitter-killerUITests
    dependencies:
      - target: twitter-killer
    settings:
      INFOPLIST_GENERATION: true
      GENERATE_INFOPLIST_FILE: true
      TEST_TARGET_NAME: twitter-killer
